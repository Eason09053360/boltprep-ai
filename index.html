<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoltPrep AI - 閃電級 AI 備考衝刺框架</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- BoltPrep 專屬 Logo 脈衝動畫 --- */
        .logo-cloud { fill: #e2e8f0; transition: fill 0.3s ease; }
        .logo-bolt { fill: #f59e0b; animation: boltPulse 2s infinite; }
        .group:hover .logo-cloud { fill: #3b82f6; }
        @keyframes boltPulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.7)); }
            100% { opacity: 1; transform: scale(1); }
        }

        .collapse-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .collapse-open { max-height: 2000px; transition: max-height 0.6s ease-in; }
        .lang-zh { color: #1e293b; font-weight: 600; font-size: 1.05rem; }
        .lang-en { color: #64748b; font-size: 0.95rem; line-height: 1.5; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .editor-bg { background: #1e1e1e; color: #d4d4d4; font-family: 'Fira Code', monospace; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel" src="./src/constants.js"></script>
    <script type="text/babel" src="./src/logo.js"></script>
    <script type="text/babel" src="./src/api.js"></script>
    <script type="text/babel" src="./src/components/navbar.js"></script>
    <script type="text/babel" src="./src/components/settings-modal.js"></script>
    <script type="text/babel" src="./src/components/question-card.js"></script>
    <script type="text/babel" src="./src/app.jsx"></script>
</body>
</html>
